    <script>
        function convertMermaidCodeBlocks() {
            document.querySelectorAll('code.language-mermaid').forEach(function(block) {
                var parent = block.parentElement;
                var container = parent && parent.tagName === 'PRE' ? parent : block;
                var wrapper = document.createElement('div');
                wrapper.className = 'mermaid';
                wrapper.textContent = block.textContent;
                container.parentNode.replaceChild(wrapper, container);
            });
        }

        function dedupePostTitle() {
            var post = document.querySelector('.post');
            if (!post) return;
            var layoutHeading = post.querySelector('h1');
            var content = post.querySelector('.post-content');
            if (!layoutHeading || !content) return;
            var firstElement = content.firstElementChild;
            if (!firstElement || !firstElement.tagName || firstElement.tagName.toLowerCase() !== 'h1') return;
            firstElement.remove();
        }

        // External link indicator
        function markExternalLinks() {
            const links = document.querySelectorAll('a[href^="http"]');
            const currentHost = window.location.hostname;
            
            links.forEach(function(link) {
                try {
                    const url = new URL(link.href);
                    if (url.hostname !== currentHost && !link.classList.contains('no-external-icon')) {
                        link.classList.add('external-link');
                        link.setAttribute('target', '_blank');
                        link.setAttribute('rel', 'noopener noreferrer');
                    }
                } catch (e) {}
            });
        }

        // Back to top button
        function initBackToTop() {
            const btn = document.getElementById('backToTop');
            if (!btn) return;

            window.addEventListener('scroll', function() {
                if (window.scrollY > 400) {
                    btn.classList.add('visible');
                } else {
                    btn.classList.remove('visible');
                }
            });

            btn.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // Keyboard navigation
        function initKeyboardNav() {
            let gPressed = false;
            let gTimeout = null;
            let currentPostIndex = -1;
            
            const helpModal = document.getElementById('kbdHelp');
            const closeBtn = helpModal?.querySelector('.kbd-help-close');
            
            function getVisiblePosts() {
                return Array.from(document.querySelectorAll('.post-item')).filter(
                    p => p.style.display !== 'none'
                );
            }
            
            function focusPost(index) {
                const posts = getVisiblePosts();
                if (posts.length === 0) return;
                
                // Remove previous focus
                posts.forEach(p => p.classList.remove('kbd-focused'));
                
                // Clamp index
                currentPostIndex = Math.max(0, Math.min(index, posts.length - 1));
                
                // Add focus
                const post = posts[currentPostIndex];
                post.classList.add('kbd-focused');
                post.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            
            function openFocusedPost() {
                const focused = document.querySelector('.post-item.kbd-focused .post-link');
                if (focused) window.location.href = focused.href;
            }
            
            function showHelp() {
                if (helpModal) {
                    helpModal.classList.add('visible');
                    helpModal.setAttribute('aria-hidden', 'false');
                }
            }
            
            function hideHelp() {
                if (helpModal) {
                    helpModal.classList.remove('visible');
                    helpModal.setAttribute('aria-hidden', 'true');
                }
            }
            
            closeBtn?.addEventListener('click', hideHelp);
            helpModal?.addEventListener('click', function(e) {
                if (e.target === helpModal) hideHelp();
            });
            
            document.addEventListener('keydown', function(e) {
                // Ignore if typing in input/textarea
                if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                if (e.target.isContentEditable) return;
                
                const key = e.key.toLowerCase();
                
                // Handle 'g' prefix for navigation
                if (gPressed) {
                    clearTimeout(gTimeout);
                    gPressed = false;
                    
                    switch(key) {
                        case 'h': window.location.href = '/'; break;
                        case 'a': window.location.href = '/about'; break;
                        case 'r': window.location.href = '/research'; break;
                        case 'v': window.location.href = '/vibes'; break;
                    }
                    return;
                }
                
                // Single key shortcuts
                switch(key) {
                    case 'g':
                        gPressed = true;
                        gTimeout = setTimeout(() => { gPressed = false; }, 500);
                        break;
                        
                    case 'j':
                        e.preventDefault();
                        focusPost(currentPostIndex + 1);
                        break;
                        
                    case 'k':
                        e.preventDefault();
                        focusPost(currentPostIndex - 1);
                        break;
                        
                    case 'o':
                    case 'enter':
                        if (document.querySelector('.post-item.kbd-focused')) {
                            e.preventDefault();
                            openFocusedPost();
                        }
                        break;
                        
                    case '?':
                        e.preventDefault();
                        showHelp();
                        break;
                        
                    case 'escape':
                        hideHelp();
                        // Remove post focus
                        document.querySelectorAll('.post-item.kbd-focused').forEach(
                            p => p.classList.remove('kbd-focused')
                        );
                        currentPostIndex = -1;
                        break;
                }
            });
        }

        // Gwern-style link hover previews
        function initLinkPreviews() {
            const cache = {};
            let previewEl = null;
            let hoverTimeout = null;
            let currentLink = null;

            function createPreviewEl() {
                const el = document.createElement('div');
                el.className = 'link-preview';
                el.innerHTML = '<div class="link-preview-title"></div><div class="link-preview-meta"></div><div class="link-preview-excerpt"></div><div class="link-preview-fade"></div>';
                document.body.appendChild(el);
                return el;
            }

            function positionPreview(link) {
                if (!previewEl) return;
                const rect = link.getBoundingClientRect();
                const scrollY = window.scrollY;
                const scrollX = window.scrollX;
                let top = rect.bottom + scrollY + 8;
                let left = rect.left + scrollX;

                // Keep within viewport horizontally
                if (left + 340 > window.innerWidth + scrollX) {
                    left = window.innerWidth + scrollX - 350;
                }
                if (left < scrollX + 10) left = scrollX + 10;

                // Flip above if too close to bottom
                if (rect.bottom + 270 > window.innerHeight) {
                    top = rect.top + scrollY - 268;
                }

                previewEl.style.top = top + 'px';
                previewEl.style.left = left + 'px';
            }

            function showPreview(link, data) {
                if (!previewEl) previewEl = createPreviewEl();
                previewEl.querySelector('.link-preview-title').textContent = data.title;
                previewEl.querySelector('.link-preview-meta').textContent = data.date;
                previewEl.querySelector('.link-preview-excerpt').textContent = data.excerpt;
                positionPreview(link);
                requestAnimationFrame(function() {
                    previewEl.classList.add('visible');
                });
            }

            function hidePreview() {
                if (previewEl) previewEl.classList.remove('visible');
                currentLink = null;
            }

            function fetchPreview(url) {
                if (cache[url]) return Promise.resolve(cache[url]);
                return fetch(url)
                    .then(function(r) { return r.text(); })
                    .then(function(html) {
                        var parser = new DOMParser();
                        var doc = parser.parseFromString(html, 'text/html');
                        var title = '';
                        var titleEl = doc.querySelector('.post-title-main') || doc.querySelector('h1');
                        if (titleEl) title = titleEl.textContent.trim();
                        var date = '';
                        var dateEl = doc.querySelector('.post-date');
                        if (dateEl) date = dateEl.textContent.trim();
                        var excerpt = '';
                        var contentEl = doc.querySelector('.post-content');
                        if (contentEl) {
                            var paragraphs = contentEl.querySelectorAll('p');
                            for (var i = 0; i < paragraphs.length; i++) {
                                var text = paragraphs[i].textContent.trim();
                                if (text.length > 30) { excerpt = text; break; }
                            }
                        }
                        var data = { title: title, date: date, excerpt: excerpt };
                        cache[url] = data;
                        return data;
                    });
            }

            function isInternalPostLink(link) {
                if (link.hostname !== window.location.hostname) return false;
                var href = link.pathname;
                // Match typical Jekyll post URLs
                if (href.match(/\/\d{4}\/\d{2}\/\d{2}\//)) return true;
                // Match post links from the home page
                if (link.closest('.post-item')) return true;
                return false;
            }

            document.addEventListener('mouseover', function(e) {
                var link = e.target.closest('a');
                if (!link || !isInternalPostLink(link)) return;
                if (link === currentLink) return;
                currentLink = link;
                clearTimeout(hoverTimeout);
                hoverTimeout = setTimeout(function() {
                    fetchPreview(link.href).then(function(data) {
                        if (currentLink === link && data.title) {
                            showPreview(link, data);
                        }
                    });
                }, 200);
            });

            document.addEventListener('mouseout', function(e) {
                var link = e.target.closest('a');
                if (link) {
                    clearTimeout(hoverTimeout);
                    hidePreview();
                }
            });
        }

        // Theme toggle + window shade
        function initThemeToggle() {
            var toggle = document.getElementById('themeToggle');
            if (!toggle) return;

            var rotDeg = 0;

            // === Toggle logic ===
            function updateToggle() {
                var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                toggle.querySelectorAll('.ray').forEach(function(r) {
                    r.style.opacity = isDark ? '0.3' : '1';
                    r.style.transition = 'opacity 1.8s ease';
                });
            }
            updateToggle();

            function doToggle() {
                var current = document.documentElement.getAttribute('data-theme');
                var next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                rotDeg += 360;
                toggle.style.transform = 'rotate(' + rotDeg + 'deg)';
                updateToggle();
            }

            toggle.addEventListener('click', doToggle);
            toggle.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); doToggle(); }
            });
        }

            function bootTerminal() {
                var term = document.getElementById('egg');
                var out = document.getElementById('eggOut');
                var inp = document.getElementById('eggIn');
                term.classList.add('active');
                out.textContent = '';
                inp.value = '';

                var lines = [
                    ['BIOS v1.0.0 ... OK', 12],
                    ['Loading kernel ... OK', 12],
                    ['Mounting /essays ... OK', 12],
                    ['Mounting /research ... OK', 12],
                    ['', 0],
                    ['switchboard\\operator v0.1', 20],
                    ['type "help" for commands. "exit" to leave.', 15],
                    ['', 0]
                ];

                var li = 0, ci = 0;
                function typeBoot() {
                    if (li >= lines.length) { inp.focus(); return; }
                    var line = lines[li][0], spd = lines[li][1];
                    if (ci < line.length) {
                        out.textContent += line[ci]; ci++;
                        setTimeout(typeBoot, spd);
                    } else {
                        out.textContent += '\n'; li++; ci = 0;
                        setTimeout(typeBoot, li <= 4 ? 120 : 200);
                    }
                }
                setTimeout(typeBoot, 300);

                function handleCmd(e) {
                    if (e.key !== 'Enter') return;
                    var raw = inp.value.trim();
                    var cmd = raw.toLowerCase();
                    inp.value = '';
                    out.textContent += '> ' + raw + '\n';

                    if (cmd === 'exit') {
                        out.textContent += 'goodbye.\n';
                        setTimeout(function() { term.classList.remove('active'); }, 400);
                        inp.removeEventListener('keydown', handleCmd);
                        return;
                    }
                    if (cmd === 'clear') { out.textContent = ''; return; }
                    if (cmd.startsWith('echo ')) { out.textContent += raw.slice(5) + '\n\n'; return; }

                    var fn = cmds[cmd];
                    if (fn) {
                        out.textContent += (typeof fn === 'function' ? fn() : fn) + '\n\n';
                    } else if (cmd) {
                        out.textContent += cmd + ': command not found. try "help"\n\n';
                    }
                    out.scrollTop = out.scrollHeight;
                    term.scrollTop = term.scrollHeight;
                }
                inp.addEventListener('keydown', handleCmd);
            }

        function initMarginnotes() {
            var notes = document.querySelectorAll('.post-content .marginnote');
            if (!notes.length) return;

            notes.forEach(function(note) {
                // Walk backward from the marginnote to find the sentence it tags.
                // The marginnote span sits inline right after the relevant text.
                // We wrap the preceding text in the same parent into a source span.
                var parent = note.parentNode;
                var nodes = Array.from(parent.childNodes);
                var idx = nodes.indexOf(note);

                // Collect text/inline nodes before the marginnote (in the same parent)
                var sourceNodes = [];
                for (var i = idx - 1; i >= 0; i--) {
                    var n = nodes[i];
                    // Stop at another marginnote
                    if (n.nodeType === 1 && n.classList && n.classList.contains('marginnote')) break;
                    sourceNodes.unshift(n);
                }

                if (!sourceNodes.length) return;

                // Wrap them in a span
                var wrapper = document.createElement('span');
                wrapper.className = 'marginnote-source-wrap';
                parent.insertBefore(wrapper, sourceNodes[0]);
                sourceNodes.forEach(function(n) { wrapper.appendChild(n); });

                note.addEventListener('click', function() {
                    var wasActive = note.classList.contains('active');

                    // Clear all active states
                    document.querySelectorAll('.marginnote.active').forEach(function(m) {
                        m.classList.remove('active');
                    });
                    document.querySelectorAll('.marginnote-source-wrap.marginnote-source').forEach(function(s) {
                        s.classList.remove('marginnote-source');
                    });

                    if (!wasActive) {
                        note.classList.add('active');
                        wrapper.classList.add('marginnote-source');
                    }
                });
            });

            // Click outside clears highlight
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.marginnote') && !e.target.closest('.marginnote-source-wrap')) {
                    document.querySelectorAll('.marginnote.active').forEach(function(m) {
                        m.classList.remove('active');
                    });
                    document.querySelectorAll('.marginnote-source-wrap.marginnote-source').forEach(function(s) {
                        s.classList.remove('marginnote-source');
                    });
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            convertMermaidCodeBlocks();
            if (typeof mermaid !== 'undefined') {
                mermaid.initialize({
                    startOnLoad: false,
                    securityLevel: 'loose',
                    theme: 'neutral'
                });
                mermaid.run({ querySelector: '.mermaid' });
            }
            dedupePostTitle();
            markExternalLinks();
            initBackToTop();
            initKeyboardNav();
            initLinkPreviews();
            initThemeToggle();
            initMarginnotes();
        });
    </script>
    <script data-goatcounter="https://amenti4k.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
