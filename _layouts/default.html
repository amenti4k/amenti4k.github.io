    <script>
        function convertMermaidCodeBlocks() {
            document.querySelectorAll('code.language-mermaid').forEach(function(block) {
                var parent = block.parentElement;
                var container = parent && parent.tagName === 'PRE' ? parent : block;
                var wrapper = document.createElement('div');
                wrapper.className = 'mermaid';
                wrapper.textContent = block.textContent;
                container.parentNode.replaceChild(wrapper, container);
            });
        }

        function dedupePostTitle() {
            var post = document.querySelector('.post');
            if (!post) return;
            var layoutHeading = post.querySelector('h1');
            var content = post.querySelector('.post-content');
            if (!layoutHeading || !content) return;
            var firstElement = content.firstElementChild;
            if (!firstElement || !firstElement.tagName || firstElement.tagName.toLowerCase() !== 'h1') return;
            firstElement.remove();
        }

        // External link indicator
        function markExternalLinks() {
            const links = document.querySelectorAll('a[href^="http"]');
            const currentHost = window.location.hostname;
            
            links.forEach(function(link) {
                try {
                    const url = new URL(link.href);
                    if (url.hostname !== currentHost && !link.classList.contains('no-external-icon')) {
                        link.classList.add('external-link');
                        link.setAttribute('target', '_blank');
                        link.setAttribute('rel', 'noopener noreferrer');
                    }
                } catch (e) {}
            });
        }

        // Back to top button
        function initBackToTop() {
            const btn = document.getElementById('backToTop');
            if (!btn) return;

            window.addEventListener('scroll', function() {
                if (window.scrollY > 400) {
                    btn.classList.add('visible');
                } else {
                    btn.classList.remove('visible');
                }
            });

            btn.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // Keyboard navigation
        function initKeyboardNav() {
            let gPressed = false;
            let gTimeout = null;
            let currentPostIndex = -1;
            
            const helpModal = document.getElementById('kbdHelp');
            const closeBtn = helpModal?.querySelector('.kbd-help-close');
            
            function getVisiblePosts() {
                return Array.from(document.querySelectorAll('.post-item')).filter(
                    p => p.style.display !== 'none'
                );
            }
            
            function focusPost(index) {
                const posts = getVisiblePosts();
                if (posts.length === 0) return;
                
                // Remove previous focus
                posts.forEach(p => p.classList.remove('kbd-focused'));
                
                // Clamp index
                currentPostIndex = Math.max(0, Math.min(index, posts.length - 1));
                
                // Add focus
                const post = posts[currentPostIndex];
                post.classList.add('kbd-focused');
                post.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            
            function openFocusedPost() {
                const focused = document.querySelector('.post-item.kbd-focused .post-link');
                if (focused) window.location.href = focused.href;
            }
            
            function showHelp() {
                if (helpModal) {
                    helpModal.classList.add('visible');
                    helpModal.setAttribute('aria-hidden', 'false');
                }
            }
            
            function hideHelp() {
                if (helpModal) {
                    helpModal.classList.remove('visible');
                    helpModal.setAttribute('aria-hidden', 'true');
                }
            }
            
            closeBtn?.addEventListener('click', hideHelp);
            helpModal?.addEventListener('click', function(e) {
                if (e.target === helpModal) hideHelp();
            });
            
            document.addEventListener('keydown', function(e) {
                // Ignore if typing in input/textarea
                if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                if (e.target.isContentEditable) return;
                
                const key = e.key.toLowerCase();
                
                // Handle 'g' prefix for navigation
                if (gPressed) {
                    clearTimeout(gTimeout);
                    gPressed = false;
                    
                    switch(key) {
                        case 'h': window.location.href = '/'; break;
                        case 'a': window.location.href = '/about'; break;
                        case 'r': window.location.href = '/research'; break;
                        case 'v': window.location.href = '/vibes'; break;
                    }
                    return;
                }
                
                // Single key shortcuts
                switch(key) {
                    case 'g':
                        gPressed = true;
                        gTimeout = setTimeout(() => { gPressed = false; }, 500);
                        break;
                        
                    case 'j':
                        e.preventDefault();
                        focusPost(currentPostIndex + 1);
                        break;
                        
                    case 'k':
                        e.preventDefault();
                        focusPost(currentPostIndex - 1);
                        break;
                        
                    case 'o':
                    case 'enter':
                        if (document.querySelector('.post-item.kbd-focused')) {
                            e.preventDefault();
                            openFocusedPost();
                        }
                        break;
                        
                    case '?':
                        e.preventDefault();
                        showHelp();
                        break;
                        
                    case 'escape':
                        hideHelp();
                        // Remove post focus
                        document.querySelectorAll('.post-item.kbd-focused').forEach(
                            p => p.classList.remove('kbd-focused')
                        );
                        currentPostIndex = -1;
                        break;
                }
            });
        }

        // Gwern-style link hover previews
        function initLinkPreviews() {
            const cache = {};
            let previewEl = null;
            let hoverTimeout = null;
            let currentLink = null;

            function createPreviewEl() {
                const el = document.createElement('div');
                el.className = 'link-preview';
                el.innerHTML = '<div class="link-preview-title"></div><div class="link-preview-meta"></div><div class="link-preview-excerpt"></div><div class="link-preview-fade"></div>';
                document.body.appendChild(el);
                return el;
            }

            function positionPreview(link) {
                if (!previewEl) return;
                const rect = link.getBoundingClientRect();
                const scrollY = window.scrollY;
                const scrollX = window.scrollX;
                let top = rect.bottom + scrollY + 8;
                let left = rect.left + scrollX;

                // Keep within viewport horizontally
                if (left + 340 > window.innerWidth + scrollX) {
                    left = window.innerWidth + scrollX - 350;
                }
                if (left < scrollX + 10) left = scrollX + 10;

                // Flip above if too close to bottom
                if (rect.bottom + 270 > window.innerHeight) {
                    top = rect.top + scrollY - 268;
                }

                previewEl.style.top = top + 'px';
                previewEl.style.left = left + 'px';
            }

            function showPreview(link, data) {
                if (!previewEl) previewEl = createPreviewEl();
                previewEl.querySelector('.link-preview-title').textContent = data.title;
                previewEl.querySelector('.link-preview-meta').textContent = data.date;
                previewEl.querySelector('.link-preview-excerpt').textContent = data.excerpt;
                positionPreview(link);
                requestAnimationFrame(function() {
                    previewEl.classList.add('visible');
                });
            }

            function hidePreview() {
                if (previewEl) previewEl.classList.remove('visible');
                currentLink = null;
            }

            function fetchPreview(url) {
                if (cache[url]) return Promise.resolve(cache[url]);
                return fetch(url)
                    .then(function(r) { return r.text(); })
                    .then(function(html) {
                        var parser = new DOMParser();
                        var doc = parser.parseFromString(html, 'text/html');
                        var title = '';
                        var titleEl = doc.querySelector('.post-title-main') || doc.querySelector('h1');
                        if (titleEl) title = titleEl.textContent.trim();
                        var date = '';
                        var dateEl = doc.querySelector('.post-date');
                        if (dateEl) date = dateEl.textContent.trim();
                        var excerpt = '';
                        var contentEl = doc.querySelector('.post-content');
                        if (contentEl) {
                            var paragraphs = contentEl.querySelectorAll('p');
                            for (var i = 0; i < paragraphs.length; i++) {
                                var text = paragraphs[i].textContent.trim();
                                if (text.length > 30) { excerpt = text; break; }
                            }
                        }
                        var data = { title: title, date: date, excerpt: excerpt };
                        cache[url] = data;
                        return data;
                    });
            }

            function isInternalPostLink(link) {
                if (link.hostname !== window.location.hostname) return false;
                var href = link.pathname;
                // Match typical Jekyll post URLs
                if (href.match(/\/\d{4}\/\d{2}\/\d{2}\//)) return true;
                // Match post links from the home page
                if (link.closest('.post-item')) return true;
                return false;
            }

            document.addEventListener('mouseover', function(e) {
                var link = e.target.closest('a');
                if (!link || !isInternalPostLink(link)) return;
                if (link === currentLink) return;
                currentLink = link;
                clearTimeout(hoverTimeout);
                hoverTimeout = setTimeout(function() {
                    fetchPreview(link.href).then(function(data) {
                        if (currentLink === link && data.title) {
                            showPreview(link, data);
                        }
                    });
                }, 200);
            });

            document.addEventListener('mouseout', function(e) {
                var link = e.target.closest('a');
                if (link) {
                    clearTimeout(hoverTimeout);
                    hidePreview();
                }
            });
        }

        // Theme toggle + window shade
        function initThemeToggle() {
            var toggle = document.getElementById('themeToggle');
            if (!toggle) return;

            // === Window shade canvas ===
            var SC = document.getElementById('shade');
            var SX = SC ? SC.getContext('2d') : null;
            var shadeOn = document.documentElement.getAttribute('data-theme') !== 'dark';
            var fadeVal = shadeOn ? 1 : 0;
            var fadeTarget = fadeVal;
            var lastT = 0;
            var rotDeg = 0;

            function fit() { if (SC) { SC.width = innerWidth; SC.height = innerHeight; } }
            addEventListener('resize', fit); fit();

            function lerp(a,b,t) { return a+(b-a)*t; }
            function lc(a,b,t) { return [Math.round(lerp(a[0],b[0],t)),Math.round(lerp(a[1],b[1],t)),Math.round(lerp(a[2],b[2],t))]; }
            function getAnimTime(n) { var p=120000,ph=(n%(p*2))/p; return (ph<1?ph:2-ph)*0.1; }
            function getAnimOpen(n) { return 0.5+Math.sin(n*0.00006)*0.04+Math.sin(n*0.00015)*0.02; }

            var offCache = {};
            function getOff(k,w,h) { var c=offCache[k]; if(c&&c.width===w&&c.height===h) return c; var nc=document.createElement('canvas'); nc.width=w; nc.height=h; offCache[k]=nc; return nc; }

            function drawShade(now) {
                if (!SX) { requestAnimationFrame(drawShade); return; }
                var dt = lastT ? (now-lastT)/1000 : 0.016; lastT = now;
                var spd = dt/1.8;
                if (fadeVal<fadeTarget) fadeVal=Math.min(fadeVal+spd,1);
                else if (fadeVal>fadeTarget) fadeVal=Math.max(fadeVal-spd,0);
                var fe = fadeVal*fadeVal*(3-2*fadeVal);

                var w=SC.width, h=SC.height;
                if (fe<0.001) { SX.clearRect(0,0,w,h); requestAnimationFrame(drawShade); return; }

                var t=getAnimTime(now), open=getAnimOpen(now), n=t/0.35;
                var st=lc([255,255,255],lc([228,214,196],[234,224,210],n),fe);
                var wl=lc([255,255,255],lc([255,215,155],[255,230,190],n),fe);
                var skX=lerp(0.34,0.26,n), skY=lerp(0.13,0.09,n), str=lerp(1.9,1.6,n);
                var wAlpha=lerp(0.28,0.17,n)*fe, bSoft=lerp(12,7,n);

                SX.clearRect(0,0,w,h);
                SX.fillStyle='rgb('+st[0]+','+st[1]+','+st[2]+')';
                SX.fillRect(0,0,w,h);

                var pW=Math.min(w*0.58,420)*str, pH=Math.min(h*0.72,500)*str*0.78;
                var bx=Math.sin(now*0.00009)*5+Math.sin(now*0.00025)*2.5;
                var by=Math.cos(now*0.00011)*3.5+Math.cos(now*0.00022)*1.8;
                var px=lerp(w*0.01,w*0.06,n)+bx, py=lerp(h*0.01,h*0.03,n)+by;
                var fT=lerp(10,7,n), nSlats=18, iH=pH-fT*2, sp=iH/nSlats;
                var sT=sp*lerp(0.88,0.12,open), gH=sp-sT;
                if (gH<0.3) { requestAnimationFrame(drawShade); return; }

                SX.save(); SX.translate(px,py); SX.transform(1,skY,skX,1,0,0);
                var oW=Math.ceil(pW+80), oH=Math.ceil(pH+80);
                var OC=getOff('off',oW,oH), OX=OC.getContext('2d');
                OX.clearRect(0,0,oW,oH);

                for (var i=0;i<nSlats;i++) {
                    var baseY=fT+i*sp+sT;
                    var wb=Math.sin(now*0.00008+i*0.53)*1.1+Math.sin(now*0.00019+i*0.79)*0.6;
                    var sy=baseY+wb, vP=i/nSlats, sSoft=bSoft*(0.55+vP*1.0);
                    var dFC=Math.abs(i-nSlats/2)/(nSlats/2), sA=1.0-dFC*0.1, padY=sSoft*1.2;
                    var g=OX.createLinearGradient(0,sy-padY,0,sy+gH+padY);
                    g.addColorStop(0,'rgba(255,255,255,0)');
                    g.addColorStop(padY/(gH+padY*2),'rgba(255,255,255,'+sA+')');
                    g.addColorStop(1-padY/(gH+padY*2),'rgba(255,255,255,'+sA+')');
                    g.addColorStop(1,'rgba(255,255,255,0)');
                    OX.fillStyle=g; OX.fillRect(fT,sy-padY,pW-fT*2,gH+padY*2);
                }

                // Horizontal + vertical vignette
                OX.globalCompositeOperation='destination-in';
                var hV=OX.createLinearGradient(fT,0,pW-fT,0);
                hV.addColorStop(0,'rgba(255,255,255,0.1)'); hV.addColorStop(0.06,'rgba(255,255,255,0.55)');
                hV.addColorStop(0.15,'rgba(255,255,255,1)'); hV.addColorStop(0.5,'rgba(255,255,255,1)');
                hV.addColorStop(0.72,'rgba(255,255,255,0.8)'); hV.addColorStop(0.85,'rgba(255,255,255,0.35)');
                hV.addColorStop(0.94,'rgba(255,255,255,0.12)'); hV.addColorStop(1,'rgba(255,255,255,0.02)');
                OX.fillStyle=hV; OX.fillRect(0,0,oW,oH);
                var vV=OX.createLinearGradient(0,fT,0,pH-fT);
                vV.addColorStop(0,'rgba(255,255,255,0.08)'); vV.addColorStop(0.05,'rgba(255,255,255,0.6)');
                vV.addColorStop(0.12,'rgba(255,255,255,1)'); vV.addColorStop(0.75,'rgba(255,255,255,0.85)');
                vV.addColorStop(0.88,'rgba(255,255,255,0.35)'); vV.addColorStop(0.95,'rgba(255,255,255,0.1)');
                vV.addColorStop(1,'rgba(255,255,255,0.02)');
                OX.fillStyle=vV; OX.fillRect(0,0,oW,oH);
                OX.globalCompositeOperation='source-over';

                // Mullion + cord cutouts
                OX.globalCompositeOperation='destination-out';
                var mW=fT*0.5, mSoft=bSoft*0.9, mx=pW*0.47;
                var mg=OX.createLinearGradient(mx-mW-mSoft,0,mx+mW+mSoft,0);
                mg.addColorStop(0,'rgba(255,255,255,0)'); mg.addColorStop(0.15,'rgba(255,255,255,1)');
                mg.addColorStop(0.85,'rgba(255,255,255,1)'); mg.addColorStop(1,'rgba(255,255,255,0)');
                OX.fillStyle=mg; OX.fillRect(mx-mW-mSoft,0,(mW+mSoft)*2,pH);
                var my=pH*0.4;
                var hg=OX.createLinearGradient(0,my-mW-mSoft,0,my+mW+mSoft);
                hg.addColorStop(0,'rgba(255,255,255,0)'); hg.addColorStop(0.15,'rgba(255,255,255,1)');
                hg.addColorStop(0.85,'rgba(255,255,255,1)'); hg.addColorStop(1,'rgba(255,255,255,0)');
                OX.fillStyle=hg; OX.fillRect(0,my-mW-mSoft,pW,(mW+mSoft)*2);
                var cX=pW*0.73+Math.sin(now*0.00025)*2.5, cW=1.5, cSoft=bSoft*0.4;
                var cG=OX.createLinearGradient(cX-cW-cSoft,0,cX+cW+cSoft,0);
                cG.addColorStop(0,'rgba(255,255,255,0)'); cG.addColorStop(0.25,'rgba(255,255,255,0.6)');
                cG.addColorStop(0.75,'rgba(255,255,255,0.6)'); cG.addColorStop(1,'rgba(255,255,255,0)');
                OX.fillStyle=cG; OX.fillRect(cX-cW-cSoft,fT,(cW+cSoft)*2,pH-fT*2);
                OX.globalCompositeOperation='source-over';

                SX.globalCompositeOperation='destination-out'; SX.drawImage(OC,0,0);
                SX.globalCompositeOperation='source-over';

                // Warm light glow through slats
                var WC=getOff('warm',oW,oH), WX=WC.getContext('2d'); WX.clearRect(0,0,oW,oH);
                var wG=WX.createRadialGradient(pW*0.4,pH*0.45,0,pW*0.4,pH*0.45,pW*0.8);
                wG.addColorStop(0,'rgba('+wl[0]+','+wl[1]+','+wl[2]+','+(wAlpha*0.9)+')');
                wG.addColorStop(0.5,'rgba('+wl[0]+','+wl[1]+','+wl[2]+','+(wAlpha*0.6)+')');
                wG.addColorStop(1,'rgba('+wl[0]+','+wl[1]+','+wl[2]+','+(wAlpha*0.15)+')');
                WX.fillStyle=wG; WX.fillRect(0,0,oW,oH);
                WX.globalCompositeOperation='destination-in'; WX.drawImage(OC,0,0);
                WX.globalCompositeOperation='source-over'; SX.drawImage(WC,0,0);

                var GC=getOff('glow',oW,oH), GX=GC.getContext('2d'); GX.clearRect(0,0,oW,oH);
                var glX=pW*0.38, glY=pH*0.42;
                var gl=GX.createRadialGradient(glX,glY,0,glX,glY,pW*0.7);

                GX.globalCompositeOperation='destination-in'; GX.drawImage(OC,0,0);

            function bootTerminal() {
                var term = document.getElementById('egg');
                var out = document.getElementById('eggOut');
                var inp = document.getElementById('eggIn');
                term.classList.add('active');
                out.textContent = '';

                var li = 0, ci = 0;
                function typeBoot() {
                    if (li >= lines.length) { inp.focus(); return; }
                    var line = lines[li][0], spd = lines[li][1];
                    if (ci < line.length) {
