---
layout: default
---

<div id="pw-gate" style="max-width:420px;margin:4rem auto;padding:2rem;text-align:center;border:1px solid var(--border-color);border-radius:6px">
  <h2 style="margin-top:0;font-size:1.1rem;font-weight:500;color:var(--text-color)">{{ page.title }}</h2>
  <p style="color:var(--secondary-text-color);font-size:13px;margin-bottom:1.5rem">enter password to continue</p>
  <form id="pw-form" autocomplete="off">
    <input type="password" id="pw-input" placeholder="password" autocomplete="off" style="padding:0.5rem;border:1px solid var(--border-color);background:var(--background-color);color:var(--text-color);font-family:inherit;font-size:14px;width:200px">
    <button type="submit" style="padding:0.5rem 1rem;border:1px solid var(--border-color);background:var(--text-color);color:var(--background-color);font-family:inherit;font-size:14px;cursor:pointer;margin-left:0.5rem">→</button>
  </form>
  <p id="pw-error" style="color:#ef4444;font-size:12px;margin-top:1rem;display:none">incorrect password</p>
</div>

<div id="pw-content" style="display:none">
  {{ content }}
</div>

<script>
(function() {
  var EXPECTED_HASH = '3b9531e4e88833e41e8a956ded8a8ed8d29ddaa72c935672c463ecac67fe71e5';
  var STORAGE_KEY = 'pageAccess';
  var pageId = '{{ page.permalink | default: page.url | slugify }}';

  function unlock() {
    document.getElementById('pw-gate').style.display = 'none';
    document.getElementById('pw-content').style.display = 'block';
  }

  async function sha256(text) {
    var buf = new TextEncoder().encode(text);
    var hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(function(b) {
      return b.toString(16).padStart(2, '0');
    }).join('');
  }

  function getAccess() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
    catch (e) { return {}; }
  }

  document.addEventListener('DOMContentLoaded', function() {
    var access = getAccess();
    if (access[pageId] === EXPECTED_HASH) {
      unlock();
      return;
    }

    var form = document.getElementById('pw-form');
    var input = document.getElementById('pw-input');
    var error = document.getElementById('pw-error');

    input.focus();

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      var hash = await sha256(input.value);
      if (hash === EXPECTED_HASH) {
        var access = getAccess();
        access[pageId] = EXPECTED_HASH;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(access));
        unlock();
      } else {
        error.style.display = 'block';
        input.value = '';
        input.focus();
      }
    });
  });
})();
</script>
